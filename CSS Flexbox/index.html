<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="header">
          <nav class="navbar">  
           <a href="/"><img src="logo.png" class="logo" alt="Zomato-logo"></a>
           <div class="search">
              <input type="text" class="input" placeholder="Search breakfast,lunch or dinner">
           </div>
           <button class="btn">Order Now</button>
          </nav>
    </header>
    <div class="container">
    <div class="card">
    <img src="burger.jpg" class="card-img" alt="burger">
    <h3>Veg Supreme Burger</h3>
    <p>This is a Tasty & Healthy Burger</p>
    </div>

    <div class="card">
        <img src="hotdog.jpg" class="card-img" alt="burger">
        <h3>Spicy Hot Dog</h3>
        <p>This is a Tasty & Healthy HotDog</p>
    </div>

    <div class="card">
        <img src="dessert.jpg" class="card-img" alt="burger">
        <h3>Delicious Dessert</h3>
        <p>This is a Tasty & Healthy Dessert</p>
    </div>
 </div>

</body>
</html>
